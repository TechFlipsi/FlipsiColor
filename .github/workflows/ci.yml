name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Abhängigkeiten installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            qt6-base-dev qt6-declarative-dev qt6-tools-dev \
            libopencv-dev libonnxruntime-dev libraw-dev \
            liblensfun-dev liblcms2-dev libavcodec-dev libavformat-dev \
            libavutil-dev libswscale-dev libswresample-dev libexif-dev \
            libgl-dev libxkbcommon-dev

      - name: Konfigurieren
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Kompilieren
        run: cmake --build build --config Release

      - name: Tests ausführen
        working-directory: build
        run: ctest --output-on-failure

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Qt installieren
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtdeclarative qtquickcontrols2 qttools'

      - name: Vcpkg Abhängigkeiten
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Konfigurieren
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Kompilieren
        run: cmake --build build --config Release

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Abhängigkeiten installieren
        run: brew install qt6 opencv onnxruntime libraw lensfun little-cms2 ffmpeg libexif

      - name: Konfigurieren
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=$(brew --prefix qt6)

      - name: Kompilieren
        run: cmake --build build --config Release

  clang-format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Clang-Format prüfen
        run: |
          sudo apt-get install -y clang-format-18
          find src include -name '*.cpp' -o -name '*.h' | xargs clang-format-18 --dry-run --Werror