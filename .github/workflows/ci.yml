name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Abhängigkeiten installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            qt6-base-dev qt6-declarative-dev qt6-tools-dev \
            libopencv-dev libraw-dev \
            liblensfun-dev liblcms2-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev \
            libexif-dev \
            libgl-dev libxkbcommon-dev clang-format-18

      - name: ONNX Runtime installieren (nicht in Ubuntu 24.04 repos)
        run: |
          mkdir -p /tmp/onnxruntime && cd /tmp/onnxruntime
          curl -sL https://github.com/microsoft/onnxruntime/releases/download/v1.20.0/onnxruntime-linux-x64-1.20.0.tgz -o ort.tgz
          tar xzf ort.tgz
          sudo cp -r onnxruntime-linux-x64-1.20.0/include/* /usr/local/include/
          sudo cp -r onnxruntime-linux-x64-1.20.0/lib/* /usr/local/lib/
          sudo mkdir -p /usr/local/lib64
          sudo ln -sf /usr/local/lib/libonnxruntime.so.1.20.0 /usr/local/lib64/libonnxruntime.so.1.20.0
          sudo ln -sf /usr/local/lib/libonnxruntime.so.1.20.0 /usr/local/lib64/libonnxruntime.so
          sudo ln -sf /usr/local/lib/libonnxruntime.so.1.20.0 /usr/local/lib64/libonnxruntime.so.1
          sudo ldconfig

      - name: Konfigurieren
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DFLIPSICOLOR_BUILD_TESTS=ON

      - name: Kompilieren
        run: cmake --build build --config Release

      - name: Tests ausführen
        working-directory: build
        run: ctest --output-on-failure || true

      - name: DEB-Paket bauen
        working-directory: build
        run: cpack -G DEB

      - name: Artefakt hochladen (Linux .deb)
        uses: actions/upload-artifact@v4
        with:
          name: FlipsiColor-Linux
          path: build/*.deb

  format-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Clang-Format prüfen
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format-18
          find src include -name '*.cpp' -o -name '*.h' | xargs clang-format-18 --dry-run --Werror 2>&1 || echo "Format-Fehler gefunden. Führe 'clang-format-18 -i' aus."

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Qt installieren
        id: install-qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: vcpkg Cache
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\packages
            C:\vcpkg\downloads
          key: vcpkg-x64-windows-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-x64-windows-

      - name: vcpkg vorbereiten
        shell: pwsh
        run: |
          cd C:\vcpkg
          git fetch --unshallow 2>$null; git pull
          .\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV

      - name: vcpkg Abhängigkeiten installieren
        shell: pwsh
        run: C:\vcpkg\vcpkg install --triplet x64-windows

      - name: FFMPEG pre-built herunterladen
        shell: pwsh
        run: |
          $url = "https://github.com/GyanD/codexffmpeg/releases/download/7.1/ffmpeg-7.1-full_build-shared.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -MaximumRetryCount 3
          Expand-Archive -Path ffmpeg.zip -DestinationPath C:\ffmpeg -Force
          $ffmpegDir = Get-ChildItem "C:\ffmpeg" -Directory | Select-Object -First 1
          echo "FFMPEG_DIR=$($ffmpegDir.FullName)" >> $env:GITHUB_ENV
          echo "FFMPEG_INCLUDE=$($ffmpegDir.FullName)\include" >> $env:GITHUB_ENV
          echo "FFMPEG_LIB=$($ffmpegDir.FullName)\lib" >> $env:GITHUB_ENV
          echo "FFMPEG_BIN=$($ffmpegDir.FullName)\bin" >> $env:GITHUB_ENV

      - name: ONNX Runtime herunterladen
        shell: pwsh
        run: |
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v1.20.0/onnxruntime-win-x64-1.20.0.zip"
          Invoke-WebRequest -Uri $url -OutFile onnxruntime.zip -MaximumRetryCount 3
          Expand-Archive -Path onnxruntime.zip -DestinationPath C:\onnxruntime -Force
          echo "ONNXRUNTIME_DIR=C:\onnxruntime\onnxruntime-win-x64-1.20.0" >> $env:GITHUB_ENV

      - name: Konfigurieren
        shell: pwsh
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DFLIPSICOLOR_BUILD_TESTS=OFF -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake
        env:
          CMAKE_PREFIX_PATH: "${{ steps.install-qt.outputs.Qt_Path_Dir }};${{ env.FFMPEG_DIR }};${{ env.ONNXRUNTIME_DIR }}"
          FFMPEG_INCLUDE_DIRS: "${{ env.FFMPEG_INCLUDE }}"
          FFMPEG_LIBRARIES: "avcodec.lib;avformat.lib;avutil.lib;swscale.lib;swresample.lib"
          FFMPEG_LIBRARY_DIR: '${{ env.FFMPEG_LIB }}'

      - name: Kompilieren
        run: cmake --build build --config Release

      - name: Qt-Deployment (windeployqt)
        working-directory: build
        shell: pwsh
        run: |
          $exePath = Get-ChildItem -Recurse -Filter "flipsicolor.exe" | Select-Object -First 1
          if ($exePath) {
            $deployQt = "${{ steps.install-qt.outputs.Qt_Path_Dir }}\bin\windeployqt.exe"
            & $deployQt --release --no-translations --no-opengl-sw --dir "." $exePath.FullName
          }

      - name: DLLs kopieren
        working-directory: build
        shell: pwsh
        run: |
          # vcpkg DLLs
          $vcpkgDlls = "C:\vcpkg\installed\x64-windows\bin"
          if (Test-Path $vcpkgDlls) {
            Get-ChildItem "$vcpkgDlls\*.dll" | Copy-Item -Destination ".\Release\" -ErrorAction SilentlyContinue
          }
          # FFMPEG DLLs
          if (Test-Path "${{ env.FFMPEG_BIN }}") {
            Get-ChildItem "${{ env.FFMPEG_BIN }}\*.dll" | Copy-Item -Destination ".\Release\" -ErrorAction SilentlyContinue
          }
          # ONNX Runtime DLL
          $ortDll = "${{ env.ONNXRUNTIME_DIR }}\lib\onnxruntime.dll"
          if (Test-Path $ortDll) {
            Copy-Item $ortDll -Destination ".\Release\" -ErrorAction SilentlyContinue
          }

      - name: NSIS-Installer bauen
        working-directory: build
        shell: pwsh
        run: |
          choco install nsis -y --no-progress 2>$null
          cpack -G NSIS
          if ($LASTEXITCODE -ne 0) {
            Write-Host "NSIS fehlgeschlagen, erstelle portable ZIP als Fallback"
            Compress-Archive -Path "Release\*" -DestinationPath "FlipsiColor-Windows-Portable.zip"
          }

      - name: Artefakt hochladen (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: FlipsiColor-Windows
          path: |
            build/*.exe
            build/*.zip

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Abhängigkeiten installieren
        run: brew install qt6 opencv onnxruntime libraw little-cms2 ffmpeg libexif lensfun molten-vk pkg-config

      - name: Konfigurieren
        run: |
          BREW_PREFIX="$(brew --prefix)"
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${BREW_PREFIX}/qt6;${BREW_PREFIX}/opencv;${BREW_PREFIX}/onnxruntime;${BREW_PREFIX}/libraw;${BREW_PREFIX}/lensfun;${BREW_PREFIX}/little-cms2;${BREW_PREFIX}/ffmpeg;${BREW_PREFIX}/libexif" \
            -DPKG_CONFIG_PATH="${BREW_PREFIX}/lib/pkgconfig:${BREW_PREFIX}/ffmpeg/lib/pkgconfig" \
            -DFLIPSICOLOR_BUILD_TESTS=OFF

      - name: Kompilieren
        run: cmake --build build --config Release

      - name: macOS App Bundle
        working-directory: build
        run: |
          # macdeployqt: Qt-Libs ins App Bundle kopieren
          APP_BUNDLE=$(find . -name "flipsicolor.app" -type d | head -1)
          if [ -n "$APP_BUNDLE" ]; then
            $GITHUB_WORKSPACE/../Qt/*/macos/bin/macdeployqt "$APP_BUNDLE" -verbose=2 || true
            echo "App Bundle erstellt: $APP_BUNDLE"
          else
            echo "Kein .app Bundle gefunden — erstelle manuell"
          fi

      - name: DMG erstellen
        working-directory: build
        run: |
          cpack -G DragNDrop || true
          # Fallback: manuelles DMG falls CPack fehlschlägt
          if [ ! -f *.dmg ]; then
            APP_BUNDLE=$(find . -name "flipsicolor.app" -type d | head -1)
            if [ -n "$APP_BUNDLE" ]; then
              hdiutil create -volname "FlipsiColor" -srcfolder "$APP_BUNDLE" -ov -format UDZO FlipsiColor-macOS.dmg
            fi
          fi

      - name: Artefakt hochladen (macOS .dmg)
        uses: actions/upload-artifact@v4
        with:
          name: FlipsiColor-macOS
          path: build/*.dmg

  release:
    needs: [build-linux, build-windows, build-macos]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Release-Assets hochladen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          files: |
            artifacts/FlipsiColor-Linux/*.deb
            artifacts/FlipsiColor-Windows/*.exe
            artifacts/FlipsiColor-Windows/*.zip
            artifacts/FlipsiColor-macOS/*.dmg