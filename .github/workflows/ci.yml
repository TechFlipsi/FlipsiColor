name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  format-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Clang-Format prüfen
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format-18
          files=$(find src include -name '*.cpp' -o -name '*.h')
          if [ -z "$files" ]; then echo "Keine Quelldateien gefunden"; exit 0; fi
          echo "$files" | xargs clang-format-18 --dry-run --Werror --style=file

  build-windows:
    runs-on: windows-2022
    permissions:
      contents: write
      actions: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      # ── MSVC Developer Environment ──
      - name: MSVC Dev-Cmd aktivieren
        uses: ilammy/msvc-dev-cmd@v1

      # ── sccache: Compiler Cache ──
      - name: sccache installieren
        shell: pwsh
        run: |
          choco install sccache -y --no-progress 2>$null
          $sccache = Get-Command sccache -ErrorAction SilentlyContinue
          if (-not $sccache) {
            $url = "https://github.com/mozilla/sccache/releases/download/v0.9.1/sccache-v0.9.1-x86_64-pc-windows-msvc.zip"
            Invoke-WebRequest -Uri $url -OutFile sccache.zip -MaximumRetryCount 3
            Expand-Archive -Path sccache.zip -DestinationPath C:\sccache -Force
            $sccacheExe = Get-ChildItem C:\sccache -Recurse -Filter "sccache.exe" | Select-Object -First 1
            $sccacheDir = Split-Path $sccacheExe.FullName
            echo "$sccacheDir" | Out-File -Append $env:GITHUB_PATH -Encoding utf8
          }
          echo "SCCACHE_GHA_ENABLED=true" >> $env:GITHUB_ENV
          echo "SCCACHE_DIR=$env:USERPROFILE\AppData\Local\Mozilla\sccache\cache" >> $env:GITHUB_ENV

      - name: sccache Cache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Mozilla\sccache\cache
          key: sccache-win-${{ runner.os }}-${{ hashFiles('src/**', 'include/**', 'CMakeLists.txt', 'src/CMakeLists.txt') }}
          restore-keys: |
            sccache-win-${{ runner.os }}-

      # ── Qt ──
      - name: Qt installieren
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          arch: 'win64_msvc2022_64'
          cache: true

      # ── Ninja Build Generator ──
      - name: Ninja installieren
        shell: pwsh
        run: |
          choco install ninja -y --no-progress 2>$null
          ninja --version

      # ── vcpkg: Binary Caching via GitHub Actions Cache ──
      - name: vcpkg Cache
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\packages
            C:\vcpkg\downloads
          key: vcpkg-x64-${{ hashFiles('vcpkg.json') }}-v3
          restore-keys: |
            vcpkg-x64-

      - name: vcpkg vorbereiten
        shell: pwsh
        run: |
          cd C:\vcpkg
          .\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV

      - name: vcpkg Abhängigkeiten installieren
        shell: pwsh
        run: |
          C:\vcpkg\vcpkg install --triplet x64-windows --clean-after-build
          Write-Host "vcpkg install completed"
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

      # ── Pre-built Dependencies: Gecacht ──
      - name: Pre-built Dependencies Cache
        uses: actions/cache@v4
        id: deps-cache
        with:
          path: |
            C:\ffmpeg
            C:\onnxruntime
            C:\opencv
          key: deps-v2-ffmpeg71-onnx1200-opencv410

      - name: FFMPEG herunterladen
        if: steps.deps-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/GyanD/codexffmpeg/releases/download/7.1/ffmpeg-7.1-full_build-shared.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -MaximumRetryCount 3
          Expand-Archive -Path ffmpeg.zip -DestinationPath C:\ffmpeg -Force

      - name: ONNX Runtime herunterladen
        if: steps.deps-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v1.20.0/onnxruntime-win-x64-1.20.0.zip"
          Invoke-WebRequest -Uri $url -OutFile onnxruntime.zip -MaximumRetryCount 3
          Expand-Archive -Path onnxruntime.zip -DestinationPath C:\onnxruntime -Force

      - name: OpenCV herunterladen
        if: steps.deps-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/opencv/opencv/releases/download/4.10.0/opencv-4.10.0-windows.exe"
          Invoke-WebRequest -Uri $url -OutFile opencv.exe -MaximumRetryCount 3
          7z x opencv.exe -oC:\opencv -y

      - name: Pre-built Pfade setzen
        shell: pwsh
        run: |
          $ffmpegDir = Get-ChildItem "C:\ffmpeg" -Directory | Select-Object -First 1
          echo "FFMPEG_DIR=$($ffmpegDir.FullName)" >> $env:GITHUB_ENV
          echo "FFMPEG_INCLUDE=$($ffmpegDir.FullName)\include" >> $env:GITHUB_ENV
          echo "FFMPEG_LIB=$($ffmpegDir.FullName)\lib" >> $env:GITHUB_ENV
          echo "FFMPEG_BIN=$($ffmpegDir.FullName)\bin" >> $env:GITHUB_ENV
          echo "ONNXRUNTIME_DIR=C:\onnxruntime\onnxruntime-win-x64-1.20.0" >> $env:GITHUB_ENV
          $ocvDir = if (Test-Path "C:\opencv\opencv\build\x64") { "C:\opencv\opencv\build" } elseif (Test-Path "C:\opencv\build\x64") { "C:\opencv\build" } else { Get-ChildItem "C:\opencv" -Directory -Recurse -Filter "build" | Where-Object { Test-Path "$($_.FullName)\x64" } | Select-Object -First 1 -ExpandProperty FullName }
          echo "OpenCV_ROOT=$ocvDir" >> $env:GITHUB_ENV
          Write-Host "OpenCV_ROOT set to: $ocvDir"

      # ── CMake Configure ──
      - name: Konfigurieren mit CMake-Preset
        shell: pwsh
        run: |
          $sccachePath = (Get-Command sccache -ErrorAction SilentlyContinue).Source
          if (-not $sccachePath) { $sccachePath = "sccache" }
          echo "SCCACHE_PATH=$sccachePath" >> $env:GITHUB_ENV
          cmake --preset windows-ci
        env:
          CMAKE_PREFIX_PATH: "${{ env.QT_ROOT_DIR }};${{ env.FFMPEG_DIR }};${{ env.ONNXRUNTIME_DIR }};${{ env.OpenCV_ROOT }}"
          FFMPEG_DIR: "${{ env.FFMPEG_DIR }}"
          FFMPEG_INCLUDE_DIRS: "${{ env.FFMPEG_INCLUDE }}"
          FFMPEG_LIBRARIES: "avcodec.lib;avformat.lib;avutil.lib;swscale.lib;swresample.lib"
          FFMPEG_LIBRARY_DIR: "${{ env.FFMPEG_LIB }}"
          ONNXRUNTIME_DIR: "${{ env.ONNXRUNTIME_DIR }}"

      # ── Build (parallel) ──
      - name: Kompilieren
        run: cmake --build --preset windows-ci -- -j${{ steps.cmake.outputs.parallelJobs || '4' }}

      - name: sccache Statistiken
        if: always()
        shell: pwsh
        run: sccache --show-stats 2>$null || Write-Host "sccache stats nicht verfügbar"

      # ── Deployment ──
      - name: Qt-Deployment - windeployqt
        working-directory: build/windows-ci
        shell: pwsh
        run: |
          $exePath = Get-ChildItem -Recurse -Filter "flipsicolor.exe" | Select-Object -First 1
          if (-not $exePath) { Write-Error "flipsicolor.exe nicht gefunden!"; exit 1 }

          $deployQt = $null
          if ($env:QT_ROOT_DIR) {
            $candidate = Join-Path $env:QT_ROOT_DIR "bin\windeployqt.exe"
            if (Test-Path $candidate) { $deployQt = $candidate }
          }
          if (-not $deployQt) {
            $deployQt = (Get-Command windeployqt -ErrorAction SilentlyContinue).Source
          }
          if (-not $deployQt) {
            $candidates = Get-ChildItem -Path "D:\a" -Recurse -Filter "windeployqt.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($candidates) { $deployQt = $candidates.FullName }
          }

          if (-not $deployQt) {
            Write-Error "windeployqt.exe nicht gefunden! QT_ROOT_DIR=$env:QT_ROOT_DIR"
            exit 1
          }

          Write-Host "windeployqt: $deployQt"
          Write-Host "Target EXE: $($exePath.FullName)"
          & $deployQt --release --no-translations --no-opengl-sw --dir ".\Release\" $exePath.FullName
          if ($LASTEXITCODE -ne 0) {
            Write-Error "windeployqt fehlgeschlagen mit Exit-Code $LASTEXITCODE"
            exit 1
          }
          Write-Host "windeployqt erfolgreich — Qt-DLLs deployt"

      - name: DLLs kopieren
        working-directory: build/windows-ci
        shell: pwsh
        run: |
          $dest = ".\Release\"
          if (-not (Test-Path $dest)) { New-Item -ItemType Directory -Path $dest | Out-Null }

          $vcpkgDlls = "C:\vcpkg\installed\x64-windows\bin"
          if (Test-Path $vcpkgDlls) {
            $copied = (Get-ChildItem "$vcpkgDlls\*.dll" | Copy-Item -Destination $dest -PassThru).Count
            Write-Host "vcpkg: $copied DLLs kopiert"
          }

          if (Test-Path "${{ env.FFMPEG_BIN }}") {
            $copied = (Get-ChildItem "${{ env.FFMPEG_BIN }}\*.dll" | Copy-Item -Destination $dest -PassThru).Count
            Write-Host "FFMPEG: $copied DLLs kopiert"
          }

          $ortDll = "${{ env.ONNXRUNTIME_DIR }}\lib\onnxruntime.dll"
          if (Test-Path $ortDll) {
            Copy-Item $ortDll -Destination $dest
            Write-Host "ONNX Runtime: onnxruntime.dll kopiert"
          }

          $ocvRoot = "${{ env.OpenCV_ROOT }}"
          $ocvCopied = $false
          foreach ($vc in @("vc17", "vc16", "vc15")) {
            foreach ($subdir in @("x64\$vc\bin", "build\x64\$vc\bin")) {
              $candidateDir = Join-Path $ocvRoot $subdir
              if (Test-Path $candidateDir) {
                $copied = (Get-ChildItem "$candidateDir\*.dll" | Copy-Item -Destination $dest -PassThru).Count
                Write-Host "OpenCV ($subdir): $copied DLLs kopiert"
                $ocvCopied = $true
              }
            }
          }
          if (-not $ocvCopied) {
            $dlls = Get-ChildItem -Path $ocvRoot -Recurse -Filter "opencv_world*.dll" -ErrorAction SilentlyContinue
            if ($dlls) {
              $copied = ($dlls | Copy-Item -Destination $dest -PassThru).Count
              Write-Host "OpenCV (recursive fallback): $copied DLLs kopiert"
              $ocvCopied = $true
            }
          }
          if (-not $ocvCopied) {
            Write-Host "WARNUNG: Keine OpenCV DLLs gefunden unter $ocvRoot"
          }

          $requiredDlls = @(
            "raw.dll", "onnxruntime.dll", "lcms2.dll", "lensfun.dll",
            "libexif.dll", "opencv_world4100.dll",
            "Qt6Core.dll", "Qt6Gui.dll", "Qt6Widgets.dll", "Qt6QuickControls2.dll"
          )
          $missing = 0
          foreach ($dll in $requiredDlls) {
            if (Test-Path "$dest$dll") {
              Write-Host "✓ $dll gefunden"
            } else {
              Write-Host "✗ $dll FEHLT!"
              $missing++
            }
          }
          if ($missing -gt 0) {
            Write-Host "WARNUNG: $missing DLLs fehlen — Programm wird nicht starten!"
          }

      - name: Paket erstellen - Portable ZIP + NSIS
        working-directory: build/windows-ci
        shell: pwsh
        run: |
          Write-Host "Erstelle portable ZIP aus Release-Verzeichnis..."
          $zipName = "FlipsiColor-Windows-Portable.zip"
          Compress-Archive -Path "Release\*" -DestinationPath $zipName
          $zipSize = (Get-Item $zipName).Length
          Write-Host "Portable ZIP erstellt: $zipName ($([math]::Round($zipSize/1MB, 1)) MB)"

          Write-Host "ZIP-Inhalt (erste 20 Einträge):"
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead((Join-Path (Get-Location) $zipName))
          $zip.Entries | Select-Object -First 20 | ForEach-Object { Write-Host "  $($_.Name)" }
          $zip.Dispose()

          choco install nsis -y --no-progress 2>$null
          cpack -G NSIS
          if ($LASTEXITCODE -eq 0) {
            $nsisFile = Get-ChildItem -Filter "*.exe" | Where-Object { $_.Name -like "*FlipsiColor*" } | Select-Object -First 1
            if ($nsisFile) {
              Write-Host "NSIS-Installer erstellt: $($nsisFile.Name)"
            }
          } else {
            Write-Host "NSIS fehlgeschlagen (Exit-Code $LASTEXITCODE) — nur ZIP verfügbar"
          }

      - name: Artefakt hochladen - Windows
        uses: actions/upload-artifact@v4
        with:
          name: FlipsiColor-Windows
          path: |
            build/windows-ci/*.exe
            build/windows-ci/*.zip

  release:
    needs: [build-windows]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Release-Assets hochladen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.2.0
          files: |
            artifacts/FlipsiColor-Windows/*.exe
            artifacts/FlipsiColor-Windows/*.zip