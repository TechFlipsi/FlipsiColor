name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet restore FlipsiColor.sln
          dotnet build FlipsiColor.sln -c Release --no-restore

      - name: TestRunner (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pip install Pillow
          CI=true dotnet run --project FlipsiColor.TestRunner/FlipsiColor.TestRunner.csproj -c Release --no-build

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          dotnet restore FlipsiColor.sln
          dotnet build FlipsiColor.sln -c Release --no-restore

  publish-linux:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore (with RID)
        run: dotnet restore FlipsiColor.sln -r linux-x64

      - name: Publish linux-x64
        run: dotnet publish FlipsiColor.Avalonia/FlipsiColor.Avalonia.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish/linux-x64 --no-restore

      - name: Install makeself
        run: sudo apt-get install -y makeself

      - name: Create makeself installer
        run: |
          makeself publish/linux-x64 FlipsiColor-${{ github.ref_name }}-Linux-x64-Installer.run \
            "FlipsiColor ${{ github.ref_name }} — Linux x64 Installer" \
            './FlipsiColor.Avalonia'

      - name: Upload Linux installer
        uses: softprops/action-gh-release@v2
        with:
          files: FlipsiColor-${{ github.ref_name }}-Linux-x64-Installer.run

  publish-windows:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore (with RID)
        run: dotnet restore FlipsiColor.sln -r win-x64

      - name: Publish win-x64
        run: dotnet publish FlipsiColor.Avalonia/FlipsiColor.Avalonia.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish/win-x64 --no-restore

      - name: Add NSIS to PATH
        shell: pwsh
        run: echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: Build NSIS Installer
        working-directory: installer/windows
        shell: cmd
        run: makensis /DPUBLISH_DIR="..\..\publish\win-x64" installer.nsi

      - name: Upload Windows installer
        uses: softprops/action-gh-release@v2
        with:
          files: installer/windows/FlipsiColor-v*-Windows-x64-Installer.exe