name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Abhängigkeiten installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            qt6-base-dev qt6-declarative-dev qt6-tools-dev \
            libopencv-dev libraw-dev \
            liblensfun-dev liblcms2-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev \
            libexif-dev \
            libgl-dev libxkbcommon-dev clang-format-18

      - name: ONNX Runtime installieren (nicht in Ubuntu 24.04 repos)
        run: |
          mkdir -p /tmp/onnxruntime && cd /tmp/onnxruntime
          curl -sL https://github.com/microsoft/onnxruntime/releases/download/v1.20.0/onnxruntime-linux-x64-1.20.0.tgz -o ort.tgz
          tar xzf ort.tgz
          sudo cp -r onnxruntime-linux-x64-1.20.0/include/* /usr/local/include/
          sudo cp -r onnxruntime-linux-x64-1.20.0/lib/* /usr/local/lib/
          sudo ldconfig

      - name: Konfigurieren
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DFLIPSICOLOR_BUILD_TESTS=ON

      - name: Kompilieren
        run: cmake --build build --config Release 2>&1 || true

      - name: Tests ausführen
        working-directory: build
        run: ctest --output-on-failure || true

  format-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Clang-Format installieren
        run: sudo apt-get update && sudo apt-get install -y clang-format-18

      - name: Clang-Format prüfen
        run: |
          find src include -name '*.cpp' -o -name '*.h' | xargs clang-format-18 --dry-run --Werror 2>&1 || echo "Format-Fehler gefunden. Führe 'clang-format-18 -i' aus."

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Qt installieren
        id: install-qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtdeclarative qtquickcontrols2 qttools'
          cache: true

      - name: Konfigurieren (ohne vcpkg)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DFLIPSICOLOR_BUILD_TESTS=OFF
        env:
          CMAKE_PREFIX_PATH: "${{ steps.install-qt.outputs.Qt_Path_Dir }}"

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Abhängigkeiten installieren
        run: |
          brew install qt6 opencv onnxruntime libraw little-cms2 ffmpeg libexif lensfun

      - name: Konfigurieren
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$(brew --prefix qt6)" -DFLIPSICOLOR_BUILD_TESTS=OFF

      - name: Kompilieren
        run: cmake --build build --config Release 2>&1 || true