name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # =============================================================================
  # Job 1: Build Core (plattformunabhängig)
  # =============================================================================
  build-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore Core
        run: dotnet restore FlipsiColor.Core/FlipsiColor.Core.csproj

      - name: Build Core
        run: dotnet build FlipsiColor.Core/FlipsiColor.Core.csproj -c Release --no-restore

      - name: Run TestRunner
        run: |
          pip install Pillow
          CI=true dotnet run --project FlipsiColor.TestRunner/FlipsiColor.TestRunner.csproj -c Release

  # =============================================================================
  # Job 2: Build Windows — WPF publish + Avalonia publish + Inno Setup Installer
  # =============================================================================
  build-windows:
    needs: build-core
    runs-on: windows-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore Solution
        run: dotnet restore FlipsiColor.sln -r win-x64

      - name: Build Solution
        run: dotnet build FlipsiColor.sln -c Release --no-restore

      # ── WPF publish (win-x64) ──
      - name: Publish WPF (win-x64)
        run: |
          dotnet publish FlipsiColor/FlipsiColor.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o FlipsiColor/publish/win-x64 --no-restore

      # ── Avalonia publish (win-x64) ──
      - name: Publish Avalonia (win-x64)
        run: |
          dotnet publish FlipsiColor.Avalonia/FlipsiColor.Avalonia.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish/avalonia-win-x64 --no-restore

      # ── VC++ Redistributable Download ──
      - name: Download VC++ Redistributable
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "FlipsiColor/publish/win-x64/VC_redist.x64.exe"

      # ── Inno Setup Installer ──
      - name: Install Inno Setup
        run: choco install innosetup -y
        shell: pwsh

      - name: Extract Version
        id: version
        run: |
          $csproj = Get-Content FlipsiColor/FlipsiColor.csproj -Raw
          if ($csproj -match '<Version>(.*?)</Version>') {
            $version = $Matches[1]
          } else {
            $version = "0.4.0"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build Inno Setup Installer
        run: |
          $version = "${{ steps.version.outputs.version }}"
          iscc installer/installer.iss /DAppVersion=$version /Oinstaller-output
        shell: pwsh

      # ── Portable ZIP (Issue #10) ──
      - name: Create Portable ZIP
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          # The publish/win-x64/ directory already contains the full self-contained app
          # Including Assets/i18n/ with JSON language files (copied via csproj Content Include)
          Compress-Archive -Path "FlipsiColor/publish/win-x64/*" -DestinationPath "installer-output/FlipsiColor-${version}-portable-win-x64.zip" -Force
          Write-Host "Portable ZIP created: FlipsiColor-${version}-portable-win-x64.zip"

      - name: Upload WPF Installer Artifact
        uses: actions/upload-artifact@v5
        with:
          name: FlipsiColor-${{ steps.version.outputs.version }}-Windows-setup
          path: installer-output/FlipsiColor-*.exe
          if-no-files-found: warn

      - name: Upload Portable ZIP Artifact
        uses: actions/upload-artifact@v5
        with:
          name: FlipsiColor-${{ steps.version.outputs.version }}-portable-win-x64
          path: installer-output/FlipsiColor-*-portable-win-x64.zip
          if-no-files-found: warn

  # =============================================================================
  # Job 3: Build Linux — Avalonia publish + .deb + .AppImage
  # =============================================================================
  build-linux:
    needs: build-core
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore Solution
        run: dotnet restore FlipsiColor.sln -r linux-x64

      - name: Build Solution
        run: dotnet build FlipsiColor.sln -c Release --no-restore

      # ── Avalonia publish (linux-x64) ──
      - name: Publish Avalonia (linux-x64)
        run: |
          dotnet publish FlipsiColor.Avalonia/FlipsiColor.Avalonia.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o installer/build/publish --no-restore

      # ── .deb + .AppImage bauen ──
      - name: Install dpkg-dev and appimagetool
        run: |
          sudo apt-get install -y dpkg-dev
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          echo "/tmp/appimagetool" >> $GITHUB_PATH

      - name: Build Linux Installers (.deb + .AppImage)
        run: |
          chmod +x installer/build-script.sh
          ./installer/build-script.sh

      - name: Upload .deb Artifact
        uses: actions/upload-artifact@v5
        with:
          name: FlipsiColor-linux-deb
          path: installer/build/FlipsiColor-*.deb
          if-no-files-found: warn

      - name: Upload .AppImage Artifact
        uses: actions/upload-artifact@v5
        with:
          name: FlipsiColor-linux-appimage
          path: installer/build/FlipsiColor-*.AppImage
          if-no-files-found: warn

  # =============================================================================
  # Job 4: Release — Bei Tag-Push: GitHub Release mit allen Installern
  # =============================================================================
  release:
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Extract Version from Tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # Windows Installer herunterladen
      - name: Download Windows Installer
        uses: actions/download-artifact@v5
        with:
          name: FlipsiColor-${{ steps.version.outputs.version }}-Windows-setup
          path: release-artifacts

      # Portable ZIP herunterladen (Issue #10)
      - name: Download Portable ZIP
        uses: actions/download-artifact@v5
        with:
          name: FlipsiColor-${{ steps.version.outputs.version }}-portable-win-x64
          path: release-artifacts

      # Linux .deb herunterladen
      - name: Download Linux .deb
        uses: actions/download-artifact@v5
        with:
          name: FlipsiColor-linux-deb
          path: release-artifacts

      # Linux .AppImage herunterladen (optional — appimagetool evtl. nicht installiert)
      - name: Download Linux .AppImage
        uses: actions/download-artifact@v5
        with:
          name: FlipsiColor-linux-appimage
          path: release-artifacts
        continue-on-error: true

      - name: List Release Artifacts
        run: ls -la release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          body: |
            ## FlipsiColor ${{ steps.version.outputs.version }} — Installerverbesserungen + Portable Windows Version

            **v0.6.0: 13 Sprachen + Systemsprache-Erkennung + JSON-Lokalisierung + Installer-Upgrade + Portable Version (Issues #9, #10).** Großes Feature-Update: 13 Sprachen (DE, EN, ES, FR, IT, NL, PL, PT, TR, RU, ZH, JA, KO), automatische Systemsprache-Erkennung mit English-Fallback, JSON-basierte Lokalisierung (Contributors können Sprachen ohne Code-Änderung hinzufügen), Installer mit Upgrade-Erkennung und Portable ZIP-Version.

            ### 📦 v0.5.5 — Installer-Verbesserungen (Issue #10)
            - **Admin-Rechte** — Installer benötigt nun Administratorrechte für korrekte Program Files Installation
            - **Verzeichnis-Anpassung** — Installationsverzeichnis kann vom Benutzer geändert werden
            - **Versions-Erkennung** — Installer erkennt bestehende Installationen und bietet Upgrade an
            - **AppMutex** — Installation wird blockiert während die App läuft
            - **Portable ZIP** — `FlipsiColor-${{ steps.version.outputs.version }}-portable-win-x64.zip` — einfach entpacken und starten, keine Installation nötig, keine Admin-Rechte

            ### 🌐 v0.5.4 — JSON-basierte Lokalisierung
            - **JSON-Sprachdateien** — alle UI-Strings in externen JSON-Dateien (Assets/i18n/de.json, en.json)
            - **Neue Sprachen** — Contributors können neue Sprachen durch einfaches Hinzufügen einer JSON-Datei hinzufügen

            ### 🌐 v0.5.3 — Sprachumschalter
            - **Language ComboBox** in der Top-Toolbar — wechselt zwischen Deutsch und English
            - **Vollständige Lokalisierung** — alle UI-Texte in der WPF-Version sind jetzt lokalisiert
            - **Live-Sprachwechsel** — Fenster wird bei Sprachwechsel neu aufgebaut, kein Neustart nötig
            - **Settings-Persistenz** — gewählte Sprache wird in settings.json gespeichert

            ### 🔧 v0.5.2 — Bugfix
            - Fixed `XamlParseException` startup crash caused by missing Icon resource in SingleFile publish mode (Issue #8)

            ### ✨ Enthaltene Funktionen aus v0.5.1
            - **Logs-Button** — Dezenter Button in der Sidebar öffnet den Logs-Ordner direkt im Dateimanager
            - **Rechtschreibfix** — "KI-Modelle werden neu heruntergeladen" (Passivform korrigiert)
            - **CI aktualisiert** — GitHub Actions v5 (Node.js 24)

            ### 🎨 Enthaltene Funktionen aus v0.5.0
            - **OpenColorIO (OCIO) Integration** — Industrie-Standard Farbmanagement als optionales Backend
            - **Pro-Funktion KI-Toggles** — jede KI-Funktion einzeln an/abschaltbar
            - **VapourSynth-Backend** — Optionaler Video-Backend mit Auto-Installation
            - **Lensfun-Integration** — Automatische Objektivkorrektur mit EXIF-Erkennung
            - **RAW-Unterstützung** — CR2, CR3, NEF, ARW, DNG (via LibRaw)

            ### Downloads
            - **Windows (Installer):** `FlipsiColor-${{ steps.version.outputs.version }}-setup.exe` (Inno Setup Installer)
            - **Windows (Portable):** `FlipsiColor-${{ steps.version.outputs.version }}-portable-win-x64.zip` (keine Installation nötig)
            - **Linux (Ubuntu/Debian):** `FlipsiColor-${{ steps.version.outputs.version }}-linux.deb`
            - **Linux (universell):** `FlipsiColor-${{ steps.version.outputs.version }}.AppImage`

            ### Systemanforderungen
            - Windows 10 (19041+) oder neuer / Ubuntu 20.04+ / Debian 11+
            - 8 GB RAM
            - GPU empfohlen (DirectML auf Windows, CPU auf Linux)
            - FFmpeg installiert (Linux: `apt install ffmpeg`)
            - libraw (Linux: `apt install libraw-dev`)
            - Optional: OpenColorIO Tools (`apt install opencolorio-tools` für LUT-Baking)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}